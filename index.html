<!DOCTYPE html>
<html lang="th">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>EV Dashboard</title>

  <link
    rel="stylesheet"
    href="https://cdn.datatables.net/1.13.8/css/jquery.dataTables.min.css"
  >

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

  <script src="https://cdn.datatables.net/1.13.8/js/jquery.dataTables.min.js"></script>

  <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>

  <style>

    body{
      font-family:Arial,sans-serif;
      margin:20px;
      background:#f5f7fb;
    }

    h1{
      margin-bottom:20px;
    }

    .filter-bar{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:20px;
    }

    .filter-bar select,
    .filter-bar button{

      padding:10px 14px;
      border-radius:8px;
      border:1px solid #d1d5db;
      font-size:14px;
    }

    .filter-bar button{
      background:#2563eb;
      color:white;
      border:none;
      cursor:pointer;
    }

    .table-wrapper{
      width:100%;
      overflow-x:auto;
      background:white;
      padding:10px;
      border-radius:12px;
      box-shadow:0 2px 8px rgba(0,0,0,0.08);
    }

    table{
      width:100%;
      min-width:1400px;
    }

    .summary{

      display:flex;
      gap:15px;
      flex-wrap:wrap;
      margin-bottom:20px;
    }

    .card{

      background:white;
      padding:15px;
      border-radius:12px;
      min-width:180px;
      box-shadow:0 2px 8px rgba(0,0,0,0.08);
    }

    .card h3{
      margin:0;
      font-size:14px;
      color:#6b7280;
    }

    .card p{
      margin-top:10px;
      font-size:24px;
      font-weight:bold;
    }

    @media(max-width:768px){

      body{
        margin:10px;
      }

      .filter-bar{
        flex-direction:column;
      }

      .filter-bar select,
      .filter-bar button{
        width:100%;
      }

      table{
        font-size:12px;
      }

      .summary{
        flex-direction:column;
      }

    }

  </style>

</head>

<body>

<h1>EV Dashboard</h1>

<div class="summary">

  <div class="card">
    <h3>จำนวนทั้งหมด</h3>
    <p id="totalCount">0</p>
  </div>

  <div class="card">
    <h3>SIM หมดอายุ</h3>
    <p id="expiredCount">0</p>
  </div>

  <div class="card">
    <h3>ใกล้หมดอายุ 30 วัน</h3>
    <p id="nearExpireCount">0</p>
  </div>

</div>

<div class="filter-bar">

  <select id="expireFilter">
    <option value="">SIM ทั้งหมด</option>
    <option value="expired">หมดอายุแล้ว</option>
    <option value="30">ภายใน 30 วัน</option>
    <option value="90">ภายใน 90 วัน</option>
  </select>

  <select id="statusFilter">
    <option value="">สถานะทั้งหมด</option>
    <option value="ACTIVE">ACTIVE</option>
    <option value="PENDING">PENDING</option>
    <option value="EXPIRED">EXPIRED</option>
    <option value="SUSPEND">SUSPEND</option>
  </select>

  <select id="bizFilter">
    <option value="">ประเภทธุรกิจทั้งหมด</option>
    <option value="ราชการ">ราชการ</option>
    <option value="เอกชน">เอกชน</option>
  </select>

  <button id="exportExcel">
    Export Excel
  </button>

</div>

<div class="table-wrapper">

  <table id="myTable" class="display"></table>

</div>

<script>

const sheetUrl =
'https://opensheet.elk.sh/1OYJPrXs7UVBN87XN0ytJZCTaNEPlblf5xVrCflzNKOY/483071119';

let mappedData = [];

function formatDate(dateStr){

  if(!dateStr) return '';

  const d = new Date(dateStr);

  if(isNaN(d)) return dateStr;

  return d.toLocaleDateString('th-TH',{
    year:'numeric',
    month:'2-digit',
    day:'2-digit'
  });

}

function renderStatusBadge(status){

  if(!status) return '';

  let color = '#6b7280';

  const s = status.toUpperCase();

  if(s === 'ACTIVE'){
    color = '#16a34a';
  }
  else if(s === 'EXPIRED'){
    color = '#dc2626';
  }
  else if(s === 'PENDING'){
    color = '#f59e0b';
  }
  else if(s === 'SUSPEND'){
    color = '#7c3aed';
  }

  return `
    <span style="
      background:${color};
      color:white;
      padding:4px 10px;
      border-radius:999px;
      font-size:12px;
      font-weight:bold;
      white-space:nowrap;
    ">
      ${status}
    </span>
  `;
}

function renderExpireDate(dateStr){

  if(!dateStr) return '';

  const today = new Date();

  const exp = new Date(dateStr);

  const diffDay = Math.ceil(
    (exp - today)/(1000*60*60*24)
  );

  let color = '#16a34a';

  if(diffDay < 0){
    color = '#dc2626';
  }
  else if(diffDay <= 30){
    color = '#f59e0b';
  }

  return `
    <span style="
      color:${color};
      font-weight:bold;
      white-space:nowrap;
    ">
      ${formatDate(dateStr)}
    </span>
  `;
}

function updateSummary(data){

  document.getElementById('totalCount')
    .innerText = data.length;

  const expired = data.filter(r=>{

    const exp = new Date(r.simExpire);

    return exp < new Date();

  });

  document.getElementById('expiredCount')
    .innerText = expired.length;

  const near = data.filter(r=>{

    const exp = new Date(r.simExpire);

    const diffDay = Math.ceil(
      (exp - new Date())/(1000*60*60*24)
    );

    return diffDay >= 0 && diffDay <= 30;

  });

  document.getElementById('nearExpireCount')
    .innerText = near.length;

}

fetch(sheetUrl)

.then(res=>res.json())

.then(rows=>{

  mappedData = rows.map(r => ({

    carNo: r.carNo || '',
    province: r.province || '',
    sim: r.sim || '',

    simExpire: r.simExpire || '',
    simRenew: r.simRenew || '',
    price: r.price || '',
    bizType: r.bizType || '',
    tsStatus: r.tsStatus || ''

  }));

  updateSummary(mappedData);

  window.table = new DataTable('#myTable', {

    data:mappedData,

    responsive:true,

    pageLength:25,

    columns:[

      {
        data:'carNo',
        title:'ทะเบียน'
      },

      {
        data:'province',
        title:'จังหวัด'
      },

      {
        data:'sim',
        title:'SIM'
      },

      {
        data:'simExpire',
        title:'วันหมดอายุ SIM',
        render:(data)=>renderExpireDate(data)
      },

      {
        data:'simRenew',
        title:'ต่ออายุ SIM'
      },

      {
        data:'price',
        title:'ราคา',
        render:(data)=>{

          if(!data) return '';

          return Number(data)
            .toLocaleString('th-TH') + ' บาท';
        }
      },

      {
        data:'bizType',
        title:'ประเภทธุรกิจ'
      },

      {
        data:'tsStatus',
        title:'สถานะ TS',
